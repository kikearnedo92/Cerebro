name: UX Reviewer Agent

on:
  schedule:
    - cron: '0 22 * * 4' # Thursday 6 PM Chile (UTC-4)
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_URL: https://cerebro-ivory.vercel.app
        run: node scripts/ux-reviewer-agent.mjs
      - name: Commit if changed
        run: |
          git config user.name "Cerebro Bot"
          git config user.email "bot@cerebro.app"
          if [ -n "$(git status --porcelain docs/ux)" ]; then
            git add docs/ux
            git commit -m "ux: weekly review $(date +%Y-%m-%d)"
            git push
          fi
