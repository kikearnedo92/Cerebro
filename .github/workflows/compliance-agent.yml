name: Compliance Agent

on:
  schedule:
    - cron: '0 14 * * 3' # 10 AM Chile (UTC-4) Wednesday
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/compliance-agent.mjs
      - name: Commit if changed
        run: |
          git config user.name "Cerebro Bot"
          git config user.email "bot@cerebro.app"
          if [ -n "$(git status --porcelain docs/compliance)" ]; then
            git add docs/compliance
            git commit -m "compliance: weekly report $(date +%Y-%m-%d)"
            git push
          fi
